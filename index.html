<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root{--bg:#0f0f11;--surface:#18181c;--surface2:#202026;--border:#2a2a32;--accent:#7c6af7;--accent2:#a78bfa;--accent-dim:rgba(124,106,247,0.15);--text:#e8e8f0;--text-muted:#6b6b80;--text-dim:#9898aa;--fav:#f472b6;--tag-bg:rgba(124,106,247,0.12);--danger:#ef4444;--success:#34d399}
  @media(prefers-color-scheme:light){:root{--bg:#f5f5f7;--surface:#ffffff;--surface2:#f0f0f5;--border:#dddde8;--accent:#6458e8;--accent2:#7c6af7;--accent-dim:rgba(100,88,232,0.1);--text:#1a1a2e;--text-muted:#888899;--text-dim:#555566;--fav:#e83e8c;--tag-bg:rgba(100,88,232,0.08);--danger:#dc2626;--success:#059669}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:0.4}
  @media(prefers-color-scheme:light){body::before{opacity:0.15}}
  header{width:100%;max-width:680px;padding:32px 20px 0;display:flex;align-items:baseline;gap:12px}
  header h1{font-size:22px;font-weight:700;letter-spacing:-0.5px;color:var(--text)}
  header span{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);background:var(--accent-dim);padding:2px 8px;border-radius:4px;letter-spacing:0.05em}
  .main{width:100%;max-width:680px;padding:24px 20px 80px;display:flex;flex-direction:column;gap:16px}
  .composer{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:12px;transition:border-color 0.2s}
  .composer:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
  textarea{background:transparent;border:none;outline:none;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.7;resize:none;width:100%;min-height:80px}
  textarea::placeholder{color:var(--text-muted)}
  .composer-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tag-input-wrap{flex:1;display:flex;align-items:center;gap:6px;min-width:180px}
  .tag-input-wrap span{font-size:13px;color:var(--text-muted);white-space:nowrap}
  input[type="text"]{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;flex:1;transition:border-color 0.2s}
  input[type="text"]:focus{border-color:var(--accent)}
  .btn-post{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:8px 20px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background 0.15s,transform 0.1s;white-space:nowrap}
  .btn-post:hover{background:var(--accent2)}.btn-post:active{transform:scale(0.97)}
  .filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .filter-bar input{flex:1;min-width:140px}
  .export-wrap{position:relative}
  .btn-export{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);border-radius:10px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;letter-spacing:0.03em;display:flex;align-items:center;gap:5px}
  .btn-export:hover{border-color:var(--success);color:var(--success);background:rgba(52,211,153,0.08)}
  .export-dropdown{position:absolute;right:0;top:calc(100% + 6px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:6px;min-width:200px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.4);display:none;flex-direction:column;gap:2px}
  .export-dropdown.open{display:flex}
  .export-item{background:none;border:none;color:var(--text-dim);padding:9px 12px;border-radius:8px;font-size:13px;cursor:pointer;text-align:left;font-family:'Noto Sans JP',sans-serif;transition:background 0.15s,color 0.15s;display:flex;align-items:center;gap:8px}
  .export-item:hover{background:var(--surface2);color:var(--text)}
  .export-item .ei-icon{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--success);background:rgba(52,211,153,0.1);padding:2px 6px;border-radius:4px;letter-spacing:0.04em}
  .auth-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px}
  .auth-bar .auth-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover}
  .auth-bar .auth-name{flex:1;color:var(--text-dim);font-size:13px}
  .btn-signout{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all 0.15s}
  .btn-signout:hover{border-color:var(--danger);color:var(--danger)}
  .btn-sheets{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);border-radius:10px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;font-family:'JetBrains Mono',monospace;letter-spacing:0.03em;display:flex;align-items:center;gap:5px}
  .btn-sheets:hover{border-color:#34a853;color:#34a853;background:rgba(52,168,83,0.08)}
  .btn-sheets.synced{border-color:#34a853;color:#34a853}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:16px;box-shadow:0 24px 64px rgba(0,0,0,0.6);animation:modalIn 0.2s ease}
  @keyframes modalIn{from{opacity:0;transform:scale(0.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal-title{font-size:17px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
  .modal-desc{font-size:13px;color:var(--text-muted);line-height:1.7}
  .modal-field{display:flex;flex-direction:column;gap:6px}
  .modal-field label{font-size:12px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;letter-spacing:0.04em}
  .modal-field input{font-family:'JetBrains Mono',monospace;font-size:12px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
  .btn-modal-cancel{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:10px;padding:8px 18px;font-size:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all 0.15s}
  .btn-modal-cancel:hover{border-color:var(--text-muted);color:var(--text)}
  .btn-modal-ok{background:#34a853;color:#fff;border:none;border-radius:10px;padding:8px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:background 0.15s}
  .btn-modal-ok:hover{background:#2d9248}
  .modal-note{font-size:12px;color:var(--text-muted);background:var(--surface2);border-radius:8px;padding:10px 14px;line-height:1.7;border-left:3px solid var(--border)}
  .modal-note a{color:var(--accent2);text-decoration:none}.modal-note a:hover{text-decoration:underline}
  .error-modal-title{font-size:16px;font-weight:700;color:var(--danger);display:flex;align-items:center;gap:8px}
  .error-modal-body{font-size:13px;color:var(--text-dim);line-height:1.8;white-space:pre-wrap;background:var(--surface2);border-radius:10px;padding:12px 14px;border-left:3px solid var(--danger)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:12px;font-size:14px;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,0.4);transition:transform 0.3s ease,opacity 0.3s ease;opacity:0;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .feed{display:flex;flex-direction:column;gap:12px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:10px;animation:slideIn 0.25s ease;transition:border-color 0.2s}
  .card:hover{border-color:#3a3a48}
  @media(prefers-color-scheme:light){.card:hover{border-color:#b0b0c8}}
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .card-text{font-size:15px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word}
  .card-tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{background:var(--tag-bg);color:var(--accent2);border-radius:6px;padding:2px 8px;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.15s}
  .tag:hover{background:rgba(124,106,247,0.25)}.tag.active-filter{background:var(--accent);color:#fff}
  .card-footer{display:flex;align-items:center;gap:12px}
  .card-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);flex:1}
  .btn-fav{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;color:var(--text-muted);font-size:13px;transition:color 0.15s;padding:4px 6px;border-radius:8px}
  .btn-fav:hover{color:var(--fav);background:rgba(244,114,182,0.08)}.btn-fav.faved{color:var(--fav)}.btn-fav svg{width:16px;height:16px}
  .btn-delete{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:12px;padding:4px 6px;border-radius:8px;transition:color 0.15s}
  .btn-delete:hover{color:var(--danger);background:rgba(239,68,68,0.08)}
  .btn-edit{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:12px;padding:4px 6px;border-radius:8px;transition:color 0.15s}
  .btn-edit:hover{color:var(--accent2);background:var(--accent-dim)}
  .comment-section{border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:8px}
  .comment-item{background:var(--surface2);border-radius:10px;padding:8px 12px;font-size:13px;color:var(--text-dim);line-height:1.6;display:flex;align-items:flex-start;gap:8px}
  .comment-item span{flex:1}
  .comment-item button{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:11px;padding:2px 4px;border-radius:4px;transition:color 0.15s;flex-shrink:0}
  .comment-item button:hover{color:var(--danger)}
  .comment-input-row{display:flex;gap:8px}
  .comment-input-row input{flex:1;font-size:13px;padding:6px 10px}
  .btn-comment-send{background:var(--surface2);border:1px solid var(--border);color:var(--accent2);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;transition:all 0.15s;white-space:nowrap;font-family:'Noto Sans JP',sans-serif}
  .btn-comment-send:hover{background:var(--accent-dim);border-color:var(--accent)}
  .empty{text-align:center;color:var(--text-muted);font-size:14px;padding:48px 0;line-height:2}
  .empty-icon{font-size:32px;margin-bottom:8px}
  .count-badge{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted);padding:2px 0}
  .fav-only-btn{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;transition:all 0.15s;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;gap:5px}
  .fav-only-btn.active{border-color:var(--fav);color:var(--fav);background:rgba(244,114,182,0.08)}
  .fav-only-btn:hover{border-color:var(--fav);color:var(--fav)}
</style>

<body>
<header><h1>棚卸しノート</h1><span>CAREER MEMO</span></header>
<div class="main">
  <div class="composer">
    <textarea id="postText" placeholder="気づいたこと、やってきたこと、スキル… 思いついたまま書いて投稿" rows="3"></textarea>
    <div class="composer-footer">
      <div class="tag-input-wrap"><span>🏷</span><input type="text" id="tagInput" placeholder="タグ（スペース区切りで複数可）"></div>
      <button class="btn-post" onclick="postMemo()">投稿</button>
    </div>
  </div>
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍 キーワードで絞り込み" oninput="renderFeed()">
    <button class="fav-only-btn" id="favOnlyBtn" onclick="toggleFavOnly()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      ファボのみ
    </button>
    <div class="export-wrap" id="exportWrap">
      <button class="btn-export" onclick="toggleExportMenu()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        出力
      </button>
      <div class="export-dropdown" id="exportDropdown">
        <button class="export-item" onclick="exportCSV()"><span class="ei-icon">CSV</span>Excelで開く用</button>
        <button class="export-item" onclick="exportMarkdown()"><span class="ei-icon">MD</span>Markdownメモ</button>
        <button class="export-item" onclick="exportResume()"><span class="ei-icon">JD</span>職務経歴書フォーマット</button>
      </div>
    </div>
    <button class="btn-sheets" id="sheetsBtn" onclick="openSheetsModal()">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      Sheets
    </button>
  </div>
  <div class="auth-bar" id="authBar" style="display:none;">
    <img class="auth-avatar" id="authAvatar" src="" alt="">
    <span class="auth-name" id="authName"></span>
    <button class="btn-signout" onclick="signOut()">サインアウト</button>
  </div>
  <div class="modal-overlay" id="sheetsModal"><div class="modal">
    <div class="modal-title">📊 Google Sheets 同期</div>
    <p class="modal-desc">同期先のスプレッドシートIDを入力してください。</p>
    <div class="modal-field"><label>SPREADSHEET ID</label><input type="text" id="sheetsId" placeholder="ここにスプレッドシートIDを貼り付け"></div>
    <div class="modal-field"><label>シート名</label><input type="text" id="sheetsSheet" placeholder="棚卸し" value="棚卸し"></div>
    <div class="modal-note">💡 スプレッドシートIDはURLの <code style="background:var(--surface2);padding:1px 5px;border-radius:3px;font-size:11px;">/d/【ここ】/edit</code> の部分です</div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeSheetsModal()">キャンセル</button>
      <button class="btn-modal-ok" onclick="syncToSheets()">同期する</button>
    </div>
  </div></div>
  <div class="modal-overlay" id="commentDeleteModal"><div class="modal">
    <div class="modal-title">🗑 コメントを削除しますか？</div>
    <p class="modal-desc" id="commentDeletePreview" style="background:var(--surface2);border-radius:10px;padding:10px 14px;font-size:13px;line-height:1.7;color:var(--text-dim);border-left:3px solid var(--danger);"></p>
    <div class="modal-actions"><button class="btn-modal-cancel" onclick="closeCommentDeleteModal()">キャンセル</button><button class="btn-modal-ok" id="commentDeleteOk" style="background:var(--danger);">削除する</button></div>
  </div></div>
  <div class="modal-overlay" id="commentEditModal"><div class="modal">
    <div class="modal-title">✏️ コメントを編集</div>
    <div class="modal-field"><input type="text" id="commentEditText" placeholder="コメントを編集…"></div>
    <div class="modal-actions"><button class="btn-modal-cancel" onclick="closeCommentEditModal()">キャンセル</button><button class="btn-modal-ok" id="commentEditOk">保存する</button></div>
  </div></div>
  <div class="modal-overlay" id="editModal"><div class="modal">
    <div class="modal-title">✏️ メモを編集</div>
    <div class="modal-field"><textarea id="editText" style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;line-height:1.7;resize:vertical;width:100%;min-height:120px;outline:none;" placeholder="メモを編集…"></textarea></div>
    <div class="modal-field"><label>タグ</label><input type="text" id="editTags" placeholder="タグ（スペース区切りで複数可）"></div>
    <div class="modal-actions"><button class="btn-modal-cancel" onclick="closeEditModal()">キャンセル</button><button class="btn-modal-ok" id="editModalOk">保存する</button></div>
  </div></div>
  <div class="modal-overlay" id="deleteModal"><div class="modal">
    <div class="modal-title">🗑 メモを削除しますか？</div>
    <p class="modal-desc" id="deleteModalPreview" style="background:var(--surface2);border-radius:10px;padding:10px 14px;font-size:13px;line-height:1.7;color:var(--text-dim);border-left:3px solid var(--danger);"></p>
    <div class="modal-actions"><button class="btn-modal-cancel" onclick="closeDeleteModal()">キャンセル</button><button class="btn-modal-ok" id="deleteModalOk" style="background:var(--danger);">削除する</button></div>
  </div></div>
  <div class="modal-overlay" id="errorModal"><div class="modal">
    <div class="error-modal-title"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="errorModalTitle"></span></div>
    <div class="error-modal-body" id="errorModalBody"></div>
    <div class="modal-actions"><button class="btn-modal-ok" onclick="closeErrorModal()" style="background:var(--accent);">閉じる</button></div>
  </div></div>
  <div class="toast" id="toast"></div>
  <div id="tagFilterRow" class="card-tags" style="min-height:0;padding:0;background:none;border:none;"></div>
  <div class="count-badge" id="countBadge"></div>
  <div class="feed" id="feed"></div>
</div>
<script>
// ── URL params → sheets config ──
(function(){
  var p=new URLSearchParams(window.location.search),sid=p.get('sid'),sh=p.get('sheet');
  if(sid){var c=JSON.parse(localStorage.getItem('sheets_config')||'{}');c.id=sid;if(sh)c.sheet=sh;localStorage.setItem('sheets_config',JSON.stringify(c))}
})();

// ── OAuth redirect: extract token from hash ──
(function(){
  var h=window.location.hash;
  if(h&&h.indexOf('access_token')!==-1){
    var p=new URLSearchParams(h.substring(1));
    var tk=p.get('access_token'),ex=parseInt(p.get('expires_in')||'3600',10);
    if(tk){
      localStorage.setItem('goog_access_token',tk);
      localStorage.setItem('goog_token_expiry',String(Date.now()+ex*1000));
      history.replaceState(null,'',window.location.pathname+window.location.search);
    }
  }
})();

var memos=JSON.parse(localStorage.getItem('tana_memos')||'[]');
var activeTagFilter=null,favOnly=false;

var GOOG_CLIENT_ID='652465897727-iol58291edt5drn7r3d1ah5k2atjk6u8.apps.googleusercontent.com';
var GOOG_SCOPE='https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.profile';
var gAccessToken=null;

// restore saved token
(function(){
  var s=localStorage.getItem('goog_access_token'),e=parseInt(localStorage.getItem('goog_token_expiry')||'0',10);
  if(s&&Date.now()<e){gAccessToken=s}else{localStorage.removeItem('goog_access_token');localStorage.removeItem('goog_token_expiry')}
})();

function startOAuthRedirect(){
  localStorage.setItem('oauth_return_url',window.location.pathname+window.location.search);
  var ru=window.location.origin+window.location.pathname;
  var u='https://accounts.google.com/o/oauth2/v2/auth?client_id='+encodeURIComponent(GOOG_CLIENT_ID)+'&redirect_uri='+encodeURIComponent(ru)+'&response_type=token&scope='+encodeURIComponent(GOOG_SCOPE)+'&prompt=select_account&include_granted_scopes=true';
  window.location.href=u;
}

function save(){localStorage.setItem('tana_memos',JSON.stringify(memos))}

function postMemo(){
  var t=document.getElementById('postText').value.trim();if(!t)return;
  var tr=document.getElementById('tagInput').value.trim();
  var tags=tr?tr.split(/\s+/).filter(Boolean).map(function(x){return x.replace(/^#/,'')}):[];
  memos.unshift({id:Date.now(),text:t,tags:tags,fav:false,comments:[],createdAt:new Date().toISOString()});
  save();document.getElementById('postText').value='';document.getElementById('tagInput').value='';
  renderFeed();renderTagFilters();autoSync();
}

function toggleFav(id){var m=memos.find(function(x){return x.id===id});if(m){m.fav=!m.fav;save();renderFeed();autoSync()}}

function deleteMemo(id){
  var m=memos.find(function(x){return x.id===id});if(!m)return;
  var pv=m.text.length>40?m.text.slice(0,40)+'…':m.text;
  document.getElementById('deleteModalPreview').textContent=pv;
  document.getElementById('deleteModalOk').onclick=function(){
    memos=memos.filter(function(x){return x.id!==id});save();renderFeed();renderTagFilters();closeDeleteModal();autoSync();
  };
  document.getElementById('deleteModal').classList.add('open');
}
function closeDeleteModal(){document.getElementById('deleteModal').classList.remove('open')}
document.getElementById('deleteModal').addEventListener('click',function(e){if(e.target===document.getElementById('deleteModal'))closeDeleteModal()});

function openEditModal(id){
  var m=memos.find(function(x){return x.id===id});if(!m)return;
  document.getElementById('editText').value=m.text;
  document.getElementById('editTags').value=m.tags.join(' ');
  document.getElementById('editModalOk').onclick=function(){
    var nt=document.getElementById('editText').value.trim();
    if(!nt){showToast('⚠️ テキストを入力してください');return}
    var tr=document.getElementById('editTags').value.trim();
    m.text=nt;m.tags=tr?tr.split(/\s+/).filter(Boolean).map(function(x){return x.replace(/^#/,'')}):[];
    save();renderFeed();renderTagFilters();closeEditModal();showToast('✅ メモを更新しました','var(--success)');autoSync();
  };
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal(){document.getElementById('editModal').classList.remove('open')}
document.getElementById('editModal').addEventListener('click',function(e){if(e.target===document.getElementById('editModal'))closeEditModal()});

function addComment(id){
  var inp=document.getElementById('ci_'+id);var t=inp.value.trim();if(!t)return;
  var m=memos.find(function(x){return x.id===id});
  if(m){m.comments.push({id:Date.now(),text:t});save();renderFeed();autoSync()}
}

function openCommentDeleteModal(mid,cid){
  var m=memos.find(function(x){return x.id===mid});var c=m&&m.comments.find(function(x){return x.id===cid});if(!c)return;
  document.getElementById('commentDeletePreview').textContent=c.text.length>40?c.text.slice(0,40)+'…':c.text;
  document.getElementById('commentDeleteOk').onclick=function(){
    m.comments=m.comments.filter(function(x){return x.id!==cid});save();renderFeed();closeCommentDeleteModal();autoSync();
  };
  document.getElementById('commentDeleteModal').classList.add('open');
}
function closeCommentDeleteModal(){document.getElementById('commentDeleteModal').classList.remove('open')}
document.getElementById('commentDeleteModal').addEventListener('click',function(e){if(e.target===document.getElementById('commentDeleteModal'))closeCommentDeleteModal()});

function openCommentEditModal(mid,cid){
  var m=memos.find(function(x){return x.id===mid});var c=m&&m.comments.find(function(x){return x.id===cid});if(!c)return;
  document.getElementById('commentEditText').value=c.text;
  document.getElementById('commentEditOk').onclick=function(){
    var nt=document.getElementById('commentEditText').value.trim();
    if(!nt){showToast('⚠️ テキストを入力してください');return}
    c.text=nt;save();renderFeed();closeCommentEditModal();showToast('✅ コメントを更新しました','var(--success)');autoSync();
  };
  document.getElementById('commentEditModal').classList.add('open');
}
function closeCommentEditModal(){document.getElementById('commentEditModal').classList.remove('open')}
document.getElementById('commentEditModal').addEventListener('click',function(e){if(e.target===document.getElementById('commentEditModal'))closeCommentEditModal()});

function setTagFilter(tag){activeTagFilter=activeTagFilter===tag?null:tag;renderFeed();renderTagFilters()}
function toggleFavOnly(){favOnly=!favOnly;document.getElementById('favOnlyBtn').classList.toggle('active',favOnly);renderFeed()}
function getAllTags(){var s=new Set();memos.forEach(function(m){m.tags.forEach(function(t){s.add(t)})});return Array.from(s)}

function renderTagFilters(){
  var tags=getAllTags(),row=document.getElementById('tagFilterRow');
  if(!tags.length){row.innerHTML='';return}
  row.innerHTML=tags.map(function(t){return '<span class="tag '+(activeTagFilter===t?'active-filter':'')+'" onclick="setTagFilter(\''+t+'\')">#'+t+'</span>'}).join('');
}

function getFiltered(){
  var q=document.getElementById('searchInput').value.trim().toLowerCase();
  return memos.filter(function(m){
    if(favOnly&&!m.fav)return false;
    if(activeTagFilter&&m.tags.indexOf(activeTagFilter)===-1)return false;
    if(q&&m.text.toLowerCase().indexOf(q)===-1&&m.tags.join(' ').toLowerCase().indexOf(q)===-1)return false;
    return true;
  });
}

function fmtDate(iso){var d=new Date(iso);function p(n){return String(n).padStart(2,'0')}return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())}

function renderFeed(){
  var filtered=getFiltered(),feed=document.getElementById('feed'),badge=document.getElementById('countBadge');
  badge.textContent=filtered.length>0?filtered.length+' 件':'';
  if(!filtered.length){feed.innerHTML='<div class="empty"><div class="empty-icon">📭</div>まだメモがありません<br>思いついたことをどんどん投稿してみましょう</div>';return}
  feed.innerHTML=filtered.map(function(m){
    var th=m.tags.length?'<div class="card-tags">'+m.tags.map(function(t){return '<span class="tag" onclick="setTagFilter(\''+t+'\')">#'+t+'</span>'}).join('')+'</div>':'';
    var ch=m.comments.length?m.comments.map(function(c){return '<div class="comment-item"><span>'+escHtml(c.text)+'</span><button onclick="openCommentEditModal('+m.id+','+c.id+')" title="編集">✏️</button><button onclick="openCommentDeleteModal('+m.id+','+c.id+')" title="削除">✕</button></div>'}).join(''):'';
    var fi=m.fav?'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    return '<div class="card" id="card_'+m.id+'"><div class="card-text">'+escHtml(m.text)+'</div>'+th+'<div class="card-footer"><span class="card-time">'+fmtDate(m.createdAt)+'</span><button class="btn-fav '+(m.fav?'faved':'')+'" onclick="toggleFav('+m.id+')" title="ファボ">'+fi+(m.fav?'ファボ済':'ファボ')+'</button><button class="btn-delete" onclick="deleteMemo('+m.id+')" title="削除">🗑</button><button class="btn-edit" onclick="openEditModal('+m.id+')" title="編集">✏️</button></div><div class="comment-section" style="flex-direction:column;gap:8px;">'+ch+'<div class="comment-input-row"><input type="text" id="ci_'+m.id+'" placeholder="コメントを追加…" onkeydown="if(event.key===\'Enter\')addComment('+m.id+')"><button class="btn-comment-send" onclick="addComment('+m.id+')">追加</button></div></div></div>';
  }).join('');
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function showErrorModal(t,b){document.getElementById('errorModalTitle').textContent=t;document.getElementById('errorModalBody').textContent=b;document.getElementById('errorModal').classList.add('open')}
function closeErrorModal(){document.getElementById('errorModal').classList.remove('open')}
document.getElementById('errorModal').addEventListener('click',function(e){if(e.target===document.getElementById('errorModal'))closeErrorModal()});

function toggleExportMenu(){document.getElementById('exportDropdown').classList.toggle('open')}
document.addEventListener('click',function(e){var w=document.getElementById('exportWrap');if(w&&!w.contains(e.target))document.getElementById('exportDropdown').classList.remove('open')});

function showToast(msg,color){var t=document.getElementById('toast');t.textContent=msg;t.style.borderColor=color||'var(--border)';t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2800)}

function download(content,filename,type){var bom=type.indexOf('csv')!==-1?'\uFEFF':'';var blob=new Blob([bom+content],{type:type});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url)}

function exportCSV(){
  document.getElementById('exportDropdown').classList.remove('open');
  var f=getFiltered();if(!f.length){showToast('出力するメモがありません');return}
  var h=['日時','テキスト','タグ','ファボ','コメント数'];
  var r=f.map(function(m){return[fmtDate(m.createdAt),'"'+m.text.replace(/"/g,'""')+'"','"'+m.tags.join(' ')+'"',m.fav?'★':'',m.comments.length]});
  var csv=[h].concat(r).map(function(x){return x.join(',')}).join('\n');
  download(csv,'tana-oroshi_'+today()+'.csv','text/csv;charset=utf-8;');showToast('✅ CSV を出力しました','var(--success)');
}

function exportMarkdown(){
  document.getElementById('exportDropdown').classList.remove('open');
  var f=getFiltered();if(!f.length){showToast('出力するメモがありません');return}
  var l=['# 棚卸しノート\n_出力日: '+today()+'_\n'];
  f.forEach(function(m){l.push('## '+fmtDate(m.createdAt)+(m.fav?' ★':''));if(m.tags.length)l.push(m.tags.map(function(t){return '`#'+t+'`'}).join(' '));l.push('');l.push(m.text);if(m.comments.length){l.push('');m.comments.forEach(function(c){l.push('> '+c.text)})}l.push('\n---\n')});
  download(l.join('\n'),'tana-oroshi_'+today()+'.md','text/markdown;charset=utf-8;');showToast('✅ Markdown を出力しました','var(--success)');
}

function exportResume(){
  document.getElementById('exportDropdown').classList.remove('open');
  var f=getFiltered();if(!f.length){showToast('出力するメモがありません');return}
  var groups={},noTag=[];
  f.forEach(function(m){if(!m.tags.length){noTag.push(m);return}m.tags.forEach(function(t){if(!groups[t])groups[t]=[];groups[t].push(m)})});
  var sep='─'.repeat(40);
  var l=['【職務経歴書 素材メモ】','出力日：'+today()+'　　件数：'+f.length+'件（ファボ：'+f.filter(function(m){return m.fav}).length+'件）',sep,''];
  var favs=f.filter(function(m){return m.fav});
  if(favs.length){l.push('★ 強み・アピールポイント（ファボ済み）');favs.forEach(function(m,i){l.push('  '+(i+1)+'. '+m.text.replace(/\n/g,' '));if(m.comments.length)m.comments.forEach(function(c){l.push('     → '+c.text)})});l.push('',sep,'')}
  Object.entries(groups).forEach(function(e){var tag=e[0],items=e[1];l.push('■ #'+tag+'（'+items.length+'件）');l.push('');items.forEach(function(m,i){l.push('  '+(i+1)+'. '+m.text.replace(/\n/g,'\n     '));if(m.comments.length)m.comments.forEach(function(c){l.push('     補足：'+c.text)});l.push('')});l.push(sep,'')});
  if(noTag.length){l.push('■ 未分類（'+noTag.length+'件）','');noTag.forEach(function(m,i){l.push('  '+(i+1)+'. '+m.text.replace(/\n/g,'\n     '));l.push('')})}
  download(l.join('\n'),'resume-material_'+today()+'.txt','text/plain;charset=utf-8;');showToast('✅ 職務経歴書素材を出力しました','var(--success)');
}

function today(){return new Date().toISOString().slice(0,10)}

async function autoSync(){
  if(!gAccessToken)return;
  var config=JSON.parse(localStorage.getItem('sheets_config')||'{}');if(!config.id)return;
  var sheet=config.sheet||'棚卸し';
  var values=[['日時','テキスト','タグ','ファボ','コメント数','コメント内容','ID']].concat(memos.map(function(m){return[fmtDate(m.createdAt),m.text,m.tags.join(' '),m.fav?'★':'',m.comments.length,m.comments.map(function(c){return c.text}).join(' | '),String(m.id)]}));
  try{
    var res=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+config.id+'/values/'+encodeURIComponent(sheet+'!A1')+'?valueInputOption=RAW',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+gAccessToken},body:JSON.stringify({range:sheet+'!A1',majorDimension:'ROWS',values:values})});
    if(res.status===401){gAccessToken=null;localStorage.removeItem('goog_access_token');localStorage.removeItem('goog_token_expiry')}
    else if(!res.ok){showToast('⚠️ 自動同期に失敗しました','var(--danger)')}
  }catch(e){}
}

async function fetchUserInfo(){
  try{
    var res=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+gAccessToken}});
    if(!res.ok){gAccessToken=null;localStorage.removeItem('goog_access_token');localStorage.removeItem('goog_token_expiry');document.getElementById('authBar').style.display='none';return}
    var u=await res.json();
    document.getElementById('authName').textContent=u.name||u.email;
    if(u.picture)document.getElementById('authAvatar').src=u.picture;
    document.getElementById('authBar').style.display='flex';
  }catch(e){}
}

function signOut(){
  gAccessToken=null;localStorage.removeItem('goog_access_token');localStorage.removeItem('goog_token_expiry');
  document.getElementById('authBar').style.display='none';
  var btn=document.getElementById('sheetsBtn');btn.classList.remove('synced');
  btn.innerHTML='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg> Sheets';
  showToast('サインアウトしました');
}

function openSheetsModal(){
  if(!gAccessToken){startOAuthRedirect();return}
  var saved=JSON.parse(localStorage.getItem('sheets_config')||'{}');
  if(saved.id)document.getElementById('sheetsId').value=saved.id;
  if(saved.sheet)document.getElementById('sheetsSheet').value=saved.sheet;
  document.getElementById('sheetsModal').classList.add('open');
}
function closeSheetsModal(){document.getElementById('sheetsModal').classList.remove('open')}

async function syncToSheets(){
  var id=document.getElementById('sheetsId').value.trim(),sheet=document.getElementById('sheetsSheet').value.trim()||'棚卸し';
  if(!id){showToast('⚠️ スプレッドシートIDを入力してください','var(--danger)');return}
  if(!gAccessToken){showToast('⚠️ 先にGoogleサインインしてください','var(--danger)');return}
  localStorage.setItem('sheets_config',JSON.stringify({id:id,sheet:sheet}));closeSheetsModal();
  var btn=document.getElementById('sheetsBtn');btn.textContent='同期中…';
  try{
    var getRes=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+id+'/values/'+encodeURIComponent(sheet+'!A:G'),{headers:{'Authorization':'Bearer '+gAccessToken}});
    if(!getRes.ok){var err=await getRes.json();handleSheetsError(getRes.status,err.error&&err.error.message||'',btn);return}
    var data=await getRes.json(),rows=(data.values||[]).slice(1);
    var localIdSet=new Set(memos.map(function(m){return String(m.id)}));
    var localKeySet=new Set(memos.map(function(m){return m.text+'|'+fmtDate(m.createdAt)}));
    var importCount=0,toImport=[];
    for(var i=0;i<rows.length;i++){var r=rows[i];if(!r[1])continue;var sid=r[6]||null,text=r[1]||'',ds=r[0]||'';
      if(sid&&localIdSet.has(sid))continue;if(!sid&&localKeySet.has(text+'|'+ds))continue;
      var tags=r[2]?r[2].split(' ').filter(Boolean):[];var fav=r[3]==='★';var ct=r[5]?r[5].split(' | ').filter(Boolean):[];
      toImport.push({id:sid?Number(sid):Date.now()+Math.random(),text:text,tags:tags,fav:fav,comments:ct.map(function(t){return{id:Date.now()+Math.random(),text:t}}),createdAt:new Date().toISOString()});importCount++}
    if(toImport.length>0){memos=memos.concat(toImport).sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt)});save();renderFeed();renderTagFilters()}
    var values=[['日時','テキスト','タグ','ファボ','コメント数','コメント内容','ID']].concat(memos.map(function(m){return[fmtDate(m.createdAt),m.text,m.tags.join(' '),m.fav?'★':'',m.comments.length,m.comments.map(function(c){return c.text}).join(' | '),String(m.id)]}));
    var putRes=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+id+'/values/'+encodeURIComponent(sheet+'!A1')+'?valueInputOption=RAW',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+gAccessToken},body:JSON.stringify({range:sheet+'!A1',majorDimension:'ROWS',values:values})});
    if(!putRes.ok){var err2=await putRes.json();handleSheetsError(putRes.status,err2.error&&err2.error.message||'',btn);return}
    btn.innerHTML='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg> 同期済';
    btn.classList.add('synced');
    showToast(importCount>0?'✅ 同期完了（'+importCount+'件をSheetsから取り込みました）':'✅ '+memos.length+'件を同期しました','#34a853');
  }catch(e){
    btn.innerHTML='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg> Sheets';
    if(e.message==='Failed to fetch'){showErrorModal('ネットワークエラー','インターネット接続を確認してください。')}else{showErrorModal('予期しないエラー',e.message)}
  }
}

function handleSheetsError(code,msg,btn){
  if(code===401){gAccessToken=null;localStorage.removeItem('goog_access_token');localStorage.removeItem('goog_token_expiry');document.getElementById('authBar').style.display='none';showErrorModal('認証が期限切れです','Sheetsボタンを押して、もう一度Googleサインインしてください。')}
  else if(code===403){showErrorModal('アクセス権限がありません','このスプレッドシートの編集権限がありません。\n共有設定で編集者権限を付与してください。')}
  else if(code===404){showErrorModal('スプレッドシートが見つかりません','スプレッドシートIDが正しいか確認してください。')}
  else if(msg.indexOf('Unable to parse range')!==-1){showErrorModal('シート名が見つかりません','スプレッドシートを開いて、下のタブに表示されているシート名を確認してください。')}
  else{showErrorModal('同期エラー','エラーコード: '+code+'\n'+msg)}
  btn.innerHTML='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg> Sheets';
}

document.getElementById('sheetsModal').addEventListener('click',function(e){if(e.target===document.getElementById('sheetsModal'))closeSheetsModal()});
document.getElementById('postText').addEventListener('keydown',function(e){if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))postMemo()});

// ── Init ──
var savedConfig=JSON.parse(localStorage.getItem('sheets_config')||'{}');
if(savedConfig.id)document.getElementById('sheetsId').value=savedConfig.id;
if(savedConfig.sheet)document.getElementById('sheetsSheet').value=savedConfig.sheet;
if(gAccessToken){fetchUserInfo();var ru=localStorage.getItem('oauth_return_url');if(ru){localStorage.removeItem('oauth_return_url');setTimeout(function(){openSheetsModal()},300)}}
renderFeed();renderTagFilters();
</script>
