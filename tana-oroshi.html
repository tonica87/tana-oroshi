<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>棚卸しノート</title>
<style>
:root{--bg:#0f0f11;--surface:#18181c;--surface2:#202026;--border:#2a2a32;--accent:#7c6af7;--accent2:#a78bfa;--accent-dim:rgba(124,106,247,.15);--text:#e8e8f0;--text-muted:#6b6b80;--text-dim:#9898aa;--fav:#f472b6;--tag-bg:rgba(124,106,247,.12);--danger:#ef4444;--success:#34d399}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
header{width:100%;max-width:680px;padding:32px 20px 0;display:flex;align-items:baseline;gap:12px}
header h1{font-size:22px;font-weight:700;color:var(--text)}
header span{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);background:var(--accent-dim);padding:2px 8px;border-radius:4px}
.main{width:100%;max-width:680px;padding:24px 20px 80px;display:flex;flex-direction:column;gap:16px}
.composer{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:12px;transition:border-color .2s}
.composer:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
textarea{background:transparent;border:none;outline:none;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.7;resize:none;width:100%;min-height:80px}
textarea::placeholder{color:var(--text-muted)}
.composer-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag-input-wrap{flex:1;display:flex;align-items:center;gap:6px;min-width:180px}
.tag-input-wrap span{font-size:13px;color:var(--text-muted);white-space:nowrap}
input[type=text]{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;flex:1;transition:border-color .2s}
input[type=text]:focus{border-color:var(--accent)}
.btn-post{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:8px 20px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap}
.btn-post:hover{background:var(--accent2)}
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-bar input{flex:1;min-width:140px}
.btn-csv{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);border-radius:10px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-csv:hover{border-color:var(--success);color:var(--success);background:rgba(52,211,153,.08)}
.fav-only-btn{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;gap:5px}
.fav-only-btn.active{border-color:var(--fav);color:var(--fav);background:rgba(244,114,182,.08)}
.feed{display:flex;flex-direction:column;gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:10px;animation:slideIn .25s ease;transition:border-color .2s}
.card:hover{border-color:#3a3a48}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.card-text{font-size:15px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word}
.card-tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{background:var(--tag-bg);color:var(--accent2);border-radius:6px;padding:2px 8px;font-size:12px;font-weight:500;cursor:pointer;transition:background .15s}
.tag:hover{background:rgba(124,106,247,.25)}
.tag.active-filter{background:var(--accent);color:#fff}
.card-footer{display:flex;align-items:center;gap:12px}
.card-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);flex:1}
.btn-fav{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;color:var(--text-muted);font-size:13px;transition:color .15s;padding:4px 6px;border-radius:8px}
.btn-fav:hover{color:var(--fav)}
.btn-fav.faved{color:var(--fav)}
.btn-delete{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:12px;padding:4px 6px;border-radius:8px;transition:color .15s}
.btn-delete:hover{color:var(--danger)}
.empty{text-align:center;color:var(--text-muted);font-size:14px;padding:48px 0;line-height:2}
.empty-icon{font-size:32px;margin-bottom:8px}
.count-badge{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted);padding:2px 0}
</style>
</head>
<body>
<header>
  <h1>棚卸しノート</h1>
  <span>CAREER MEMO</span>
</header>
<div class="main">
  <div class="composer">
    <textarea id="postText" placeholder="気づいたこと、やってきたこと、スキル… 思いついたまま書いて投稿" rows="3"></textarea>
    <div class="composer-footer">
      <div class="tag-input-wrap">
        <span>🏷</span>
        <input type="text" id="tagInput" placeholder="タグ（スペース区切りで複数可）">
      </div>
      <button class="btn-post" onclick="postMemo()">投稿</button>
    </div>
  </div>
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍 キーワードで絞り込み" oninput="renderFeed()">
    <button class="fav-only-btn" id="favOnlyBtn" onclick="toggleFavOnly()">♥ ファボのみ</button>
    <button class="btn-csv" onclick="exportCSV()">↓ CSV出力</button>
  </div>
  <div id="tagFilterRow" class="card-tags" style="min-height:0;padding:0;background:none;border:none;"></div>
  <div class="count-badge" id="countBadge"></div>
  <div class="feed" id="feed"></div>
</div>
<script>
let memos=JSON.parse(localStorage.getItem('tana_memos')||'[]');
let activeTagFilter=null,favOnly=false;
function save(){localStorage.setItem('tana_memos',JSON.stringify(memos))}
function postMemo(){
  const text=document.getElementById('postText').value.trim();
  if(!text)return;
  const tagRaw=document.getElementById('tagInput').value.trim();
  const tags=tagRaw?tagRaw.split(/\s+/).filter(Boolean).map(t=>t.replace(/^#/,'')):[]; 
  memos.unshift({id:Date.now(),text,tags,fav:false,createdAt:new Date().toISOString()});
  save();
  document.getElementById('postText').value='';
  document.getElementById('tagInput').value='';
  renderFeed();renderTagFilters();
}
function toggleFav(id){const m=memos.find(m=>m.id===id);if(m){m.fav=!m.fav;save();renderFeed()}}
function deleteMemo(id){memos=memos.filter(m=>m.id!==id);save();renderFeed();renderTagFilters()}
function setTagFilter(tag){activeTagFilter=activeTagFilter===tag?null:tag;renderFeed();renderTagFilters()}
function toggleFavOnly(){favOnly=!favOnly;document.getElementById('favOnlyBtn').classList.toggle('active',favOnly);renderFeed()}
function getAllTags(){const s=new Set();memos.forEach(m=>m.tags.forEach(t=>s.add(t)));return[...s]}
function renderTagFilters(){const tags=getAllTags();const row=document.getElementById('tagFilterRow');if(!tags.length){row.innerHTML='';return}row.innerHTML=tags.map(t=>'<span class="tag '+(activeTagFilter===t?'active-filter':'')+'" onclick="setTagFilter(\''+t+'\')">'+escHtml('#'+t)+'</span>').join('')}
function getFiltered(){const q=document.getElementById('searchInput').value.trim().toLowerCase();return memos.filter(m=>{if(favOnly&&!m.fav)return false;if(activeTagFilter&&!m.tags.includes(activeTagFilter))return false;if(q&&!m.text.toLowerCase().includes(q)&&!m.tags.join(' ').toLowerCase().includes(q))return false;return true})}
function fmtDate(iso){const d=new Date(iso);const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function renderFeed(){
  const filtered=getFiltered();
  const feed=document.getElementById('feed');
  const badge=document.getElementById('countBadge');
  badge.textContent=filtered.length>0?filtered.length+' 件':'';
  if(!filtered.length){feed.innerHTML='<div class="empty"><div class="empty-icon">📭</div>まだメモがありません<br>思いついたことをどんどん投稿してみましょう</div>';return}
  feed.innerHTML=filtered.map(m=>{
    const tagsHtml=m.tags.length?'<div class="card-tags">'+m.tags.map(t=>'<span class="tag" onclick="setTagFilter(\''+t+'\')">'+escHtml('#'+t)+'</span>').join('')+'</div>':'';
    const favIcon=m.fav?'♥':'♡';
    return '<div class="card" id="card_'+m.id+'"><div class="card-text">'+escHtml(m.text)+'</div>'+tagsHtml+'<div class="card-footer"><span class="card-time">'+fmtDate(m.createdAt)+'</span><button class="btn-fav '+(m.fav?'faved':'')+'" onclick="toggleFav('+m.id+')">'+favIcon+(m.fav?' ファボ済':' ファボ')+'</button><button class="btn-delete" onclick="deleteMemo('+m.id+')" title="削除">🗑</button></div></div>';
  }).join('');
}
function exportCSV(){
  const filtered=getFiltered();
  if(!filtered.length){alert('出力するメモがありません');return}
  const header=['日時','テキスト','タグ','ファボ'];
  const rows=filtered.map(m=>[fmtDate(m.createdAt),'"'+m.text.replace(/"/g,'""')+'"','"'+m.tags.join(' ')+'"',m.fav?'★':'']);
  const csv=[header,...rows].map(r=>r.join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='tana-oroshi_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(url);
}
document.getElementById('postText').addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))postMemo()});
renderFeed();renderTagFilters();
</script>
</body>
</html>
